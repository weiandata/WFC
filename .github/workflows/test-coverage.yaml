on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-coverage

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      MIN_COVERAGE: 80
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::covr
            any::survey
          needs: coverage

      - name: Enforce line coverage floor
        shell: Rscript {0}
        run: |
          coverage <- covr::package_coverage(type = "tests", quiet = FALSE)
          print(coverage)
          percent <- covr::percent_coverage(coverage)
          minimum <- as.numeric(Sys.getenv("MIN_COVERAGE"))
          message(sprintf("Line coverage: %.2f%% (minimum %.2f%%)", percent, minimum))
          if (percent < minimum) {
            stop(sprintf("Coverage %.2f%% is below the %.2f%% floor.", percent, minimum))
          }
